name: Playwright Tests on: push: branches: [main] pull_request: branches: [main] jobs: test: runs-on: ubuntu-latest timeout-minutes: 10 steps: - uses: actions/checkout@v4 - uses: actions/setup-node@v4 with: node-version: 20 cache: npm - name: Install dependencies run: npm ci - name: Install Playwright Chromium run: npx playwright install chromium --with-deps - name: Run Playwright tests run: npx playwright test - name: Upload Playwright report if: failure() uses: actions/upload-artifact@v4 with: name: playwright-report path: playwright-report/ retention-days: 14 - name: Upload test results if: failure() uses: actions/upload-artifact@v4 with: name: test-results path: test-results/ retention-days: 14
